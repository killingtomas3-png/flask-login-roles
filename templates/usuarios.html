<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
{% extends "base.html" %}
{% block content %}
  <h2 class="animated-title">Usuarios</h2>
  <div class="card p-4 animated-box">
    <table class="table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Usuario</th>
          <th>Rol</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        {% for user in users %}
          <tr>
            <td>{{ user['id'] }}</td>
            <td>{{ user['username'] }}</td>
            <td>{{ user['role'] }}</td>
            <td>
              <a href="{{ url_for('eliminar_usuario', id=user['id']) }}" class="btn btn-danger btn-sm glow-btn">Eliminar</a>
            </td>
          </tr>
        {% endfor %}
      </tbody>
    </table>
    <a href="{{ url_for('nuevo_usuario') }}" class="btn btn-success glow-btn">Nuevo Usuario</a>
  </div>
{% endblock %}
